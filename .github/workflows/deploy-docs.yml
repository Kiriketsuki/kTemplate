name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build index page
        run: |
          mkdir -p docs
          python3 - << 'EOF'
          import os
          import re

          docs_dir = "docs"
          html_files = []

          for root, dirs, files in os.walk(docs_dir):
              # Skip root docs/ — only recurse into subdirectories
              if root == docs_dir:
                  continue
              for f in files:
                  if f.endswith(".html"):
                      rel_path = os.path.join(root, f).replace(os.sep, "/")
                      html_files.append(rel_path)

          html_files.sort()

          # Extract title from HTML file
          def extract_title(path):
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read(2048)
                      m = re.search(r"<title[^>]*>(.*?)</title>", content, re.IGNORECASE | re.DOTALL)
                      if m:
                          return re.sub(r"\s+", " ", m.group(1)).strip()
              except Exception:
                  pass
              return os.path.basename(path).replace(".html", "").replace("-", " ").replace("_", " ").title()

          # Group by subdirectory
          groups = {}
          for path in html_files:
              parts = path.split("/")
              # parts[0] = "docs", parts[1] = type subdir, rest = filename
              if len(parts) >= 3:
                  group = parts[1]
              else:
                  group = "other"
              groups.setdefault(group, []).append(path)

          sections = ""
          for group, files in sorted(groups.items()):
              items = ""
              for path in files:
                  title = extract_title(path)
                  items += f'      <li><a href="{path}">{title}</a></li>\n'
              sections += f"""
            <section>
              <h2>{group.replace("-", " ").replace("_", " ").title()}</h2>
              <ul>
          {items}      </ul>
            </section>
          """

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Visual Explainer Gallery</title>
            <style>
              body {{ font-family: IBM Plex Sans, system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background: #faf9f7; color: #1a1a1a; }}
              h1 {{ font-size: 1.75rem; margin-bottom: 0.5rem; }}
              p.subtitle {{ color: #666; margin-bottom: 2rem; }}
              section {{ margin-bottom: 2rem; }}
              h2 {{ font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #444; border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; margin-bottom: 1rem; }}
              ul {{ list-style: none; padding: 0; margin: 0; }}
              li {{ margin-bottom: 0.5rem; }}
              a {{ color: #0369a1; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              .empty {{ color: #999; font-style: italic; }}
            </style>
          </head>
          <body>
            <h1>Visual Explainer Gallery</h1>
            <p class="subtitle">Self-contained HTML pages generated by the visual-explainer skill.</p>
            {sections if sections else '<p class="empty">No diagrams yet. Run <code>/visual-explainer:generate-web-diagram --publish</code> to create one.</p>'}
          </body>
          </html>
          """

          # Dedent
          lines = page.split("\n")
          output = "\n".join(l[10:] if l.startswith("          ") else l for l in lines)

          with open(os.path.join(docs_dir, "index.html"), "w") as out:
              out.write(output)

          print(f"Generated docs/index.html listing {len(html_files)} files across {len(groups)} groups")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
