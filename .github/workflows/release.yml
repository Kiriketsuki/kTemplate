name: Release Management

on:
    pull_request:
        branches:
            - release
        types: [closed]
    push:
        branches:
            - release

jobs:
    create-release:
        if: |
            (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'release') ||
            (github.event_name == 'push' && github.ref == 'refs/heads/release')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Sync VERSION from main
              run: |
                  git fetch origin main --depth=1
                  git checkout origin/main -- VERSION
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  if ! git diff --cached --quiet; then
                    git commit -m "chore: sync VERSION from main [skip ci]"
                    git push origin release
                  fi

            - name: Get version from VERSION file
              id: get_version
              run: |
                  if [ -f VERSION ]; then
                    VERSION=$(cat VERSION)
                    echo "version=$VERSION" >> $GITHUB_OUTPUT
                    echo "Creating release for version: $VERSION"

                    if [[ $VERSION =~ ^([0-9]{2})\.([0-9]+)\.([0-9]+)\.([0-9]+)([a-zA-Z]*)$ ]]; then
                      YY="${BASH_REMATCH[1]}"
                      MAJOR="${BASH_REMATCH[2]}"
                      MINOR="${BASH_REMATCH[3]}"
                      PATCH="${BASH_REMATCH[4]}"

                      echo "year=20$YY" >> $GITHUB_OUTPUT
                      echo "major=$MAJOR" >> $GITHUB_OUTPUT

                      git fetch --tags --force 2>/dev/null || true
                      PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                      MAJORS_ADDED=0

                      if [ -n "$PREV_TAG" ]; then
                        PREV_VERSION=${PREV_TAG#v}
                        if [[ $PREV_VERSION =~ ^([0-9]{2})\.([0-9]+)\.([0-9]+)\.([0-9]+)([a-zA-Z]*)$ ]]; then
                          PREV_MAJOR="${BASH_REMATCH[2]}"
                          PREV_YY="${BASH_REMATCH[1]}"
                          if [ "$YY" == "$PREV_YY" ]; then
                            MAJORS_ADDED=$((MAJOR - PREV_MAJOR))
                          else
                            MAJORS_ADDED=$MAJOR
                          fi
                        fi
                      else
                        MAJORS_ADDED=$MAJOR
                      fi

                      if [ $MAJORS_ADDED -lt 0 ]; then MAJORS_ADDED=0; fi
                      echo "majors_added=$MAJORS_ADDED" >> $GITHUB_OUTPUT
                      echo "minor=$MINOR" >> $GITHUB_OUTPUT
                      echo "patch=$PATCH" >> $GITHUB_OUTPUT
                    fi
                  else
                    echo "No VERSION file found"
                    exit 1
                  fi

            - name: Create Git tag
              run: |
                  VERSION=${{ steps.get_version.outputs.version }}
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -a "v$VERSION" -m "Release version $VERSION"
                  git push origin "v$VERSION"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: v${{ steps.get_version.outputs.version }}
                  name: Release v${{ steps.get_version.outputs.version }}
                  body: |
                      ## Release v${{ steps.get_version.outputs.version }}

                      **Year**: ${{ steps.get_version.outputs.year }}

                      ### Statistics
                      - Tasks merged this year: ${{ steps.get_version.outputs.major }}
                      - Tasks added this release: ${{ steps.get_version.outputs.majors_added }}
                      - Features (minor): ${{ steps.get_version.outputs.minor }}
                      - Bug fixes (patch): ${{ steps.get_version.outputs.patch }}

                      ### Changes
                      ${{ github.event.pull_request.body }}
                  draft: false
                  prerelease: false
