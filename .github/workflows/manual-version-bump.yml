name: Manual Monthly Version Bump

on:
    workflow_dispatch:

jobs:
    bump-version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Read current version
              id: current_version
              run: |
                  if [ -f VERSION ]; then
                    CURRENT_VERSION=$(cat VERSION)
                    echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
                    echo "Current version: $CURRENT_VERSION"
                  else
                    echo "No VERSION file found"
                    exit 1
                  fi

            - name: Calculate new version
              id: new_version
              run: |
                  CURRENT="${{ steps.current_version.outputs.current }}"

                  if [[ $CURRENT =~ ^([0-9]{2})\.([0-9]{2})\.([0-9]+)\.([0-9]+)([a-z]*)$ ]]; then
                    OLD_YY="${BASH_REMATCH[1]}"
                    OLD_MM="${BASH_REMATCH[2]}"
                    OLD_MAJOR="${BASH_REMATCH[3]}"

                    CURRENT_YY=$(date +%y)
                    CURRENT_MM=$(date +%m)

                    if [ "$CURRENT_YY" != "$OLD_YY" ]; then
                      NEW_VERSION="$CURRENT_YY.$CURRENT_MM.0.0"
                      echo "New year detected. Resetting to $NEW_VERSION"
                    elif [ "$CURRENT_MM" != "$OLD_MM" ]; then
                      NEW_VERSION="$CURRENT_YY.$CURRENT_MM.$OLD_MAJOR.0"
                      echo "New month detected. Bumping to $NEW_VERSION"
                    else
                      echo "Version already up to date with current month/year. No bump needed."
                      exit 0
                    fi

                    echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
                  else
                    echo "Error: Invalid version format: $CURRENT"
                    echo "Expected: YY.MM.Major.Minor (e.g., 26.03.0.0)"
                    exit 1
                  fi

            - name: Update VERSION file
              if: steps.new_version.outputs.new != ''
              run: |
                  echo "${{ steps.new_version.outputs.new }}" > VERSION

            - name: Commit version bump
              if: steps.new_version.outputs.new != ''
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add VERSION
                  git commit -m "chore: monthly version bump to $NEW_VERSION"
                  git push origin ${{ github.ref_name }}

            - name: Summary
              if: steps.new_version.outputs.new != ''
              run: |
                  echo "## Monthly Version Bump Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous Version**: ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **New Version**: ${{ steps.new_version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
