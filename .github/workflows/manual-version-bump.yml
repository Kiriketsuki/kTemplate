name: Manual Version Bump

on:
    workflow_dispatch:
        inputs:
            bump_type:
                description: 'Version segment to bump'
                required: true
                type: choice
                options:
                    - year-rollover
                    - major
                    - minor
                    - patch
                default: year-rollover

jobs:
    bump-version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Read current version
              id: current_version
              run: |
                  if [ -f VERSION ]; then
                    CURRENT_VERSION=$(cat VERSION)
                    echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
                    echo "Current version: $CURRENT_VERSION"
                  else
                    echo "No VERSION file found"
                    exit 1
                  fi

            - name: Calculate new version
              id: new_version
              run: |
                  CURRENT="${{ steps.current_version.outputs.current }}"
                  BUMP_TYPE="${{ github.event.inputs.bump_type }}"

                  if [[ $CURRENT =~ ^([0-9]{2})\.([0-9]+)\.([0-9]+)\.([0-9]+)([a-zA-Z]*)$ ]]; then
                    YY="${BASH_REMATCH[1]}"
                    MAJOR="${BASH_REMATCH[2]}"
                    MINOR="${BASH_REMATCH[3]}"
                    PATCH="${BASH_REMATCH[4]}"
                  else
                    echo "Error: Invalid version format: $CURRENT"
                    echo "Expected: YY.Major.Minor.Patch[hotfix] (e.g. 26.1.0.0)"
                    exit 1
                  fi

                  CURRENT_YY=$(date +%y)

                  if [ "$BUMP_TYPE" = "year-rollover" ]; then
                    if [ "$YY" != "$CURRENT_YY" ]; then
                      NEW_VERSION="$CURRENT_YY.0.0.0"
                      echo "Year rollover: $YY → $CURRENT_YY. Resetting to $NEW_VERSION"
                    else
                      echo "Already on current year ($CURRENT_YY). No rollover needed."
                      exit 0
                    fi
                  elif [ "$BUMP_TYPE" = "major" ]; then
                    MAJOR=$((MAJOR + 1))
                    NEW_VERSION="$YY.$MAJOR.0.0"
                  elif [ "$BUMP_TYPE" = "minor" ]; then
                    MINOR=$((MINOR + 1))
                    NEW_VERSION="$YY.$MAJOR.$MINOR.0"
                  elif [ "$BUMP_TYPE" = "patch" ]; then
                    PATCH=$((PATCH + 1))
                    NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                  fi

                  echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "New version: $NEW_VERSION"

            - name: Update VERSION file
              if: steps.new_version.outputs.new != ''
              run: |
                  echo "${{ steps.new_version.outputs.new }}" > VERSION

            - name: Commit version bump
              if: steps.new_version.outputs.new != ''
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"
                  BUMP_TYPE="${{ github.event.inputs.bump_type }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add VERSION
                  git commit -m "ci: manual $BUMP_TYPE bump to $NEW_VERSION [skip ci]"
                  git push origin ${{ github.ref_name }}

            - name: Summary
              if: steps.new_version.outputs.new != ''
              run: |
                  echo "## Manual Version Bump Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Bump Type**: ${{ github.event.inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous Version**: ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **New Version**: ${{ steps.new_version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
